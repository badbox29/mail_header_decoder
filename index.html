<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mail Flow Analyzer</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg-page:#1a1a1f;--bg-card:#22222a;--bg-card2:#2a2a35;--bg-input:#16161c;
  --border:#3a3a4a;--border-light:#4a4a5a;
  --text-primary:#e8e8f0;--text-secondary:#9090a8;--text-muted:#606075;
  --blue:#3b82f6;--blue-hover:#2563eb;--blue-dim:rgba(59,130,246,0.15);
  --green:#22c55e;--green-dim:rgba(34,197,94,0.12);
  --orange:#f59e0b;--orange-dim:rgba(245,158,11,0.12);
  --red:#ef4444;--red-dim:rgba(239,68,68,0.12);
  --purple:#a78bfa;--purple-dim:rgba(167,139,250,0.12);
  --cyan:#22d3ee;--cyan-dim:rgba(34,211,238,0.1);
  --yellow:#fde047;--yellow-dim:rgba(253,224,71,0.1);
}
.light{
  --bg-page:#f0f0f5;--bg-card:#ffffff;--bg-card2:#f5f5fa;--bg-input:#eaeaf2;
  --border:#d0d0e0;--border-light:#b0b0cc;
  --text-primary:#1a1a2e;--text-secondary:#5a5a78;--text-muted:#9090a8;
  --blue-dim:rgba(59,130,246,0.1);--green-dim:rgba(34,197,94,0.1);
  --orange-dim:rgba(245,158,11,0.1);--red-dim:rgba(239,68,68,0.1);
  --purple-dim:rgba(167,139,250,0.1);--cyan-dim:rgba(34,211,238,0.08);--yellow-dim:rgba(253,224,71,0.1);
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'DM Sans',sans-serif;background:var(--bg-page);color:var(--text-primary);min-height:100vh;transition:background .2s,color .2s;}
a{color:var(--blue);}
/* LAYOUT */
.topbar{background:var(--bg-card);border-bottom:1px solid var(--border);padding:12px 24px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;}
.topbar-title{font-size:18px;font-weight:600;display:flex;align-items:center;gap:8px;}
.topbar-title span{font-size:20px;}
.topbar-actions{display:flex;gap:8px;align-items:center;}
.wrap{max-width:1100px;margin:0 auto;padding:24px 20px 60px;}
/* TABS */
.mode-tabs{display:flex;gap:4px;margin-bottom:20px;}
.mode-tab{padding:8px 18px;border:1px solid var(--border);background:transparent;color:var(--text-secondary);border-radius:8px;cursor:pointer;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:500;transition:all .15s;}
.mode-tab.active{background:var(--blue);color:#fff;border-color:var(--blue);}
.mode-tab:hover:not(.active){color:var(--text-primary);border-color:var(--border-light);}
/* CARDS */
.card{background:var(--bg-card);border:1px solid var(--border);border-radius:12px;padding:20px 24px;margin-bottom:16px;}
.card-hd{display:flex;align-items:center;gap:10px;margin-bottom:14px;}
.card-icon{width:34px;height:34px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0;}
.ci-blue{background:var(--blue-dim);color:var(--blue);}
.ci-green{background:var(--green-dim);color:var(--green);}
.ci-orange{background:var(--orange-dim);color:var(--orange);}
.ci-red{background:var(--red-dim);color:var(--red);}
.ci-purple{background:var(--purple-dim);color:var(--purple);}
.ci-cyan{background:var(--cyan-dim);color:var(--cyan);}
.card-title{font-size:15px;font-weight:600;}
.card-desc{font-size:12px;color:var(--text-secondary);margin-top:1px;}
/* BUTTONS */
.btn-primary{background:var(--blue);color:#fff;border:none;border-radius:8px;padding:11px 22px;font-size:14px;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif;transition:background .15s;display:inline-flex;align-items:center;gap:7px;}
.btn-primary:hover{background:var(--blue-hover);}
.btn-secondary{background:var(--bg-card2);color:var(--text-secondary);border:1px solid var(--border);border-radius:8px;padding:11px 18px;font-size:13px;font-weight:500;cursor:pointer;font-family:'DM Sans',sans-serif;transition:all .15s;}
.btn-secondary:hover{color:var(--text-primary);border-color:var(--border-light);}
.btn-ghost{background:transparent;color:var(--text-secondary);border:1px solid var(--border);border-radius:6px;padding:6px 12px;font-size:12px;cursor:pointer;font-family:'DM Sans',sans-serif;transition:all .15s;}
.btn-ghost:hover{color:var(--text-primary);border-color:var(--border-light);}
.btn-green{background:var(--green-dim);color:var(--green);border:1px solid rgba(34,197,94,.25);border-radius:6px;padding:6px 14px;font-size:12px;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif;transition:all .15s;}
.btn-green:hover{background:rgba(34,197,94,.2);}
/* INPUT */
textarea{width:100%;background:var(--bg-input);border:1px solid var(--border);border-radius:8px;color:var(--text-primary);font-family:'JetBrains Mono',monospace;font-size:12px;line-height:1.6;padding:14px;resize:vertical;min-height:180px;outline:none;transition:border-color .15s;}
textarea:focus{border-color:var(--blue);}
textarea::placeholder{color:var(--text-muted);}
/* BADGES */
.badge{display:inline-flex;align-items:center;gap:4px;padding:3px 10px;border-radius:12px;font-size:11px;font-weight:700;letter-spacing:.3px;}
.b-pass{background:var(--green-dim);color:var(--green);border:1px solid rgba(34,197,94,.25);}
.b-fail{background:var(--red-dim);color:var(--red);border:1px solid rgba(239,68,68,.25);}
.b-soft{background:var(--orange-dim);color:var(--orange);border:1px solid rgba(245,158,11,.25);}
.b-none{background:var(--bg-card2);color:var(--text-muted);border:1px solid var(--border);}
.b-blue{background:var(--blue-dim);color:var(--blue);border:1px solid rgba(59,130,246,.25);}
.b-purple{background:var(--purple-dim);color:var(--purple);border:1px solid rgba(167,139,250,.25);}
/* SUMMARY GRID */
.sum-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:10px;}
.sum-item{background:var(--bg-card2);border:1px solid var(--border);border-radius:8px;padding:12px 14px;}
.sum-lbl{font-size:11px;color:var(--text-muted);text-transform:uppercase;letter-spacing:.6px;margin-bottom:4px;}
.sum-val{font-size:13px;font-weight:500;word-break:break-all;line-height:1.4;}
.sum-val.mono{font-family:'JetBrains Mono',monospace;font-size:11px;}
/* EXEC SUMMARY */
.finding-box{background:var(--blue-dim);border:1px solid rgba(59,130,246,.25);border-radius:10px;padding:14px 18px;margin-top:14px;}
.finding-label{font-size:11px;color:var(--blue);font-weight:700;text-transform:uppercase;letter-spacing:.6px;margin-bottom:6px;}
.finding-text{font-size:14px;line-height:1.6;color:var(--text-primary);}
.confidence-row{display:flex;align-items:center;gap:8px;margin-top:8px;}
.conf-dots{display:flex;gap:3px;}
.conf-dot{width:8px;height:8px;border-radius:50%;background:var(--border);}
.conf-dot.filled{background:var(--blue);}
.conf-label{font-size:12px;color:var(--text-secondary);}
/* AUTH */
.auth-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:10px;}
.auth-item{background:var(--bg-card2);border:1px solid var(--border);border-radius:8px;padding:12px 14px;}
.auth-name{font-size:13px;font-weight:700;margin-bottom:4px;display:flex;align-items:center;justify-content:space-between;}
.auth-explain{font-size:11px;color:var(--text-secondary);line-height:1.5;margin-top:6px;}
.auth-item.pass{border-color:rgba(34,197,94,.3);}
.auth-item.fail{border-color:rgba(239,68,68,.3);}
.auth-item.soft{border-color:rgba(245,158,11,.3);}
/* TIMELINE */
.timeline-controls{display:flex;gap:8px;margin-bottom:14px;align-items:center;}
.timeline-controls span{font-size:12px;color:var(--text-muted);margin-left:auto;}
.hop-wrap{position:relative;}
.hop-connector{display:flex;justify-content:center;align-items:center;height:22px;color:var(--text-muted);font-size:18px;position:relative;}
.hop-connector::before{content:'';position:absolute;left:50%;top:0;bottom:0;width:1px;background:var(--border);transform:translateX(-50%);}
.hop-connector-icon{background:var(--bg-page);padding:0 4px;position:relative;z-index:1;font-size:14px;}
.hop-card{background:var(--bg-card2);border:1px solid var(--border);border-radius:10px;margin-bottom:0;overflow:hidden;transition:border-color .15s;}
.hop-card:hover{border-color:var(--border-light);}
.hop-card.hop-critical{border-color:rgba(239,68,68,.4);}
.hop-card.hop-warn{border-color:rgba(245,158,11,.3);}
.hop-card.hop-first{border-color:rgba(167,139,250,.3);}
.hop-card.hop-last{border-color:rgba(34,197,94,.3);}
.hop-summary{display:flex;align-items:center;gap:12px;padding:14px 16px;cursor:pointer;user-select:none;}
.hop-num-badge{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0;}
.hop-num-badge.n-first{background:var(--purple-dim);color:var(--purple);}
.hop-num-badge.n-last{background:var(--green-dim);color:var(--green);}
.hop-num-badge.n-mid{background:var(--blue-dim);color:var(--blue);}
.hop-num-badge.n-crit{background:var(--red-dim);color:var(--red);}
.hop-summary-body{flex:1;min-width:0;}
.hop-summary-title{font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.hop-summary-meta{font-size:11px;color:var(--text-muted);margin-top:2px;display:flex;gap:8px;flex-wrap:wrap;}
.hop-right{display:flex;align-items:center;gap:8px;flex-shrink:0;}
.delay-pill{padding:3px 9px;border-radius:12px;font-size:11px;font-weight:700;}
.dp-fast{background:var(--green-dim);color:var(--green);}
.dp-minor{background:var(--yellow-dim);color:var(--yellow);}
.dp-warn{background:var(--orange-dim);color:var(--orange);}
.dp-crit{background:var(--red-dim);color:var(--red);}
.dp-none{background:var(--bg-card);color:var(--text-muted);}
.chevron{font-size:14px;color:var(--text-muted);transition:transform .2s;}
.chevron.open{transform:rotate(180deg);}
.hop-detail{display:none;border-top:1px solid var(--border);padding:14px 16px;}
.hop-detail.open{display:block;}
.hop-detail-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px;}
.hd-item{background:var(--bg-input);border-radius:6px;padding:8px 10px;}
.hd-lbl{font-size:10px;color:var(--text-muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:3px;}
.hd-val{font-size:12px;font-family:'JetBrains Mono',monospace;color:var(--text-secondary);word-break:break-all;line-height:1.4;}
.hd-val.good{color:var(--green);}
.hd-val.bad{color:var(--red);}
.hop-raw-toggle{font-size:11px;color:var(--blue);cursor:pointer;margin-top:8px;display:inline-block;}
.hop-raw{display:none;background:var(--bg-input);border:1px solid var(--border);border-radius:6px;padding:10px;margin-top:6px;font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--text-secondary);line-height:1.6;white-space:pre-wrap;word-break:break-all;}
.hop-raw.open{display:block;}
.hop-notes{background:var(--bg-input);border-radius:6px;padding:10px;font-size:12px;color:var(--text-secondary);line-height:1.6;margin-top:8px;}
.hop-notes.warn{background:var(--orange-dim);color:var(--orange);}
.hop-notes.crit{background:var(--red-dim);color:var(--red);}
.sys-badge{display:inline-flex;align-items:center;gap:5px;background:var(--purple-dim);color:var(--purple);border:1px solid rgba(167,139,250,.2);border-radius:6px;padding:3px 9px;font-size:11px;font-weight:600;}
.tls-badge{display:inline-flex;align-items:center;gap:5px;background:var(--green-dim);color:var(--green);border:1px solid rgba(34,197,94,.2);border-radius:6px;padding:3px 9px;font-size:11px;font-weight:600;}
.notls-badge{display:inline-flex;align-items:center;gap:5px;background:var(--red-dim);color:var(--red);border:1px solid rgba(239,68,68,.2);border-radius:6px;padding:3px 9px;font-size:11px;font-weight:600;}
/* DELAY BAR */
.delay-bar-wrap{margin:10px 0;}
.delay-bar-bg{background:var(--bg-input);border-radius:4px;height:6px;overflow:hidden;}
.delay-bar{height:100%;border-radius:4px;transition:width .4s;}
.db-fast{background:var(--green);}
.db-minor{background:var(--yellow);}
.db-warn{background:var(--orange);}
.db-crit{background:var(--red);}
/* SECURITY */
.sec-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:10px;}
.sec-item{background:var(--bg-card2);border:1px solid var(--border);border-radius:8px;padding:12px 14px;}
.sec-q{font-size:12px;color:var(--text-secondary);margin-bottom:6px;}
.sec-a{font-size:13px;font-weight:600;}
/* DELIVERY */
.del-timeline{display:flex;flex-direction:column;gap:6px;}
.del-hop{display:flex;align-items:center;gap:10px;font-size:12px;}
.del-bar-outer{flex:1;background:var(--bg-input);border-radius:4px;height:8px;overflow:hidden;}
.del-bar-inner{height:100%;border-radius:4px;}
/* MICROSOFT */
.ms-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:10px;}
.ms-item{background:var(--bg-card2);border:1px solid var(--border);border-radius:8px;padding:12px 14px;text-align:center;}
.ms-val{font-size:24px;font-weight:700;margin-bottom:4px;}
.ms-lbl{font-size:11px;color:var(--text-muted);}
.ms-explain{font-size:11px;color:var(--text-secondary);margin-top:4px;}
/* RAW */
.raw-search{width:100%;background:var(--bg-input);border:1px solid var(--border);border-radius:6px;color:var(--text-primary);font-family:'DM Sans',sans-serif;font-size:13px;padding:8px 14px;outline:none;margin-bottom:10px;}
.raw-search::placeholder{color:var(--text-muted);}
.raw-search:focus{border-color:var(--blue);}
.raw-viewer{background:var(--bg-input);border:1px solid var(--border);border-radius:8px;padding:14px;font-family:'JetBrains Mono',monospace;font-size:12px;line-height:1.7;max-height:400px;overflow-y:auto;white-space:pre-wrap;word-break:break-all;}
.hl-key{color:var(--blue);}
.hl-val{color:var(--text-secondary);}
.hl-match{background:rgba(253,224,71,.25);border-radius:2px;}
/* WARN / INFO BOXES */
.warn-box{background:var(--orange-dim);border:1px solid rgba(245,158,11,.3);border-radius:8px;padding:12px 16px;font-size:13px;color:var(--orange);display:flex;gap:10px;}
.info-box{background:var(--blue-dim);border:1px solid rgba(59,130,246,.2);border-radius:8px;padding:12px 16px;font-size:13px;color:var(--text-secondary);display:flex;gap:10px;}
.error-box{background:var(--red-dim);border:1px solid rgba(239,68,68,.3);border-radius:8px;padding:16px;text-align:center;color:var(--red);}
/* COMPARISON */
.cmp-col{flex:1;min-width:0;}
.cmp-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.cmp-lbl{font-size:11px;color:var(--text-muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px;}
.diff-row{display:flex;gap:8px;font-size:12px;padding:6px 0;border-bottom:1px solid var(--border);}
.diff-row:last-child{border-bottom:none;}
.diff-key{color:var(--text-muted);min-width:120px;}
.diff-a{flex:1;word-break:break-all;}
.diff-b{flex:1;word-break:break-all;}
.diff-changed{color:var(--orange);}
.diff-same{color:var(--text-secondary);}
.diff-missing{color:var(--red);font-style:italic;}
/* SANITIZE */
.san-options{display:flex;flex-wrap:wrap;gap:10px;margin-bottom:14px;}
.san-opt{display:flex;align-items:center;gap:6px;font-size:13px;cursor:pointer;}
.san-opt input{cursor:pointer;width:15px;height:15px;}
/* TOOLTIP */
.tooltip-wrap{position:relative;display:inline-block;}
.tooltip-icon{font-size:11px;color:var(--text-muted);cursor:help;margin-left:4px;border:1px solid var(--border);border-radius:50%;width:14px;height:14px;display:inline-flex;align-items:center;justify-content:center;}
.tooltip-popup{display:none;position:absolute;bottom:calc(100% + 4px);left:50%;transform:translateX(-50%);background:var(--bg-card);border:1px solid var(--border);border-radius:8px;padding:8px 12px;font-size:12px;color:var(--text-secondary);white-space:nowrap;max-width:260px;white-space:normal;z-index:200;box-shadow:0 4px 16px rgba(0,0,0,.3);line-height:1.5;}
.tooltip-wrap:hover .tooltip-popup{display:block;}
/* MISC */
.sample-btn{font-size:12px;color:var(--blue);background:none;border:none;cursor:pointer;font-family:'DM Sans',sans-serif;text-decoration:underline;padding:4px 0;}
.section-divider{height:1px;background:var(--border);margin:6px 0 14px;}
.row{display:flex;gap:10px;align-items:center;}
.spacer{flex:1;}
.mono{font-family:'JetBrains Mono',monospace;font-size:11px;}
.text-muted{color:var(--text-muted);}
.text-sm{font-size:12px;}
.xhdr-chev.open{transform:rotate(180deg);}
.xhdr-body.open{display:block !important;}
.phase-header{display:flex;align-items:center;gap:8px;padding:8px 0 6px;margin-top:6px;}
.phase-label{font-size:11px;font-weight:700;color:var(--text-muted);text-transform:uppercase;letter-spacing:.8px;white-space:nowrap;}
.phase-line{flex:1;height:1px;background:var(--border);}
.phase-icon{font-size:13px;}
</style>
</head>
<body>
<div class="topbar">
  <div class="topbar-title"><span>✉</span> Mail Flow Analyzer</div>
  <div class="topbar-actions">
    <button class="btn-ghost" onclick="toggleTheme()" id="themeBtn">☀ Light</button>
  </div>
</div>
<div class="wrap">
  <div class="mode-tabs">
    <button class="mode-tab active" onclick="showMode('single',this)">Single Analysis</button>
    <button class="mode-tab" onclick="showMode('compare',this)">Compare Two Headers</button>
  </div>

  <!-- SINGLE MODE -->
  <div id="mode-single">
    <div class="card">
      <div class="card-hd">
        <div class="card-icon ci-blue">📋</div>
        <div><div class="card-title">Paste Email Headers</div><div class="card-desc">Copy full raw headers from your email client and paste below</div></div>
      </div>
      <textarea id="headerInput" placeholder="Paste raw email headers here…"></textarea>
      <div style="display:flex;gap:12px;align-items:center;margin-top:8px;flex-wrap:wrap;">
        <button class="sample-btn" onclick="loadSample()">Load sample headers</button>
        <div style="flex:1"></div>
        <button class="btn-primary" onclick="decodeHeaders()">🔍 Decode Headers</button>
        <button class="btn-secondary" onclick="resetAll()">Reset</button>
      </div>
    </div>
    <div id="results"></div>
  </div>

  <!-- COMPARE MODE -->
  <div id="mode-compare" style="display:none;">
    <div class="cmp-grid" style="margin-bottom:14px;">
      <div class="card" style="margin:0;">
        <div class="card-hd"><div class="card-icon ci-blue">📋</div><div><div class="card-title">Headers A</div></div></div>
        <textarea id="cmpA" placeholder="Paste first set of headers…" style="min-height:140px;"></textarea>
      </div>
      <div class="card" style="margin:0;">
        <div class="card-hd"><div class="card-icon ci-purple">📋</div><div><div class="card-title">Headers B</div></div></div>
        <textarea id="cmpB" placeholder="Paste second set of headers…" style="min-height:140px;"></textarea>
      </div>
    </div>
    <div style="text-align:center;margin-bottom:16px;">
      <button class="btn-primary" onclick="doCompare()">⚖ Compare Headers</button>
    </div>
    <div id="cmp-results"></div>
  </div>
</div>

<script>
// ─── THEME ──────────────────────────────────────────────────────────────────
function toggleTheme(){
  const b=document.body,btn=document.getElementById('themeBtn');
  b.classList.toggle('light');
  btn.textContent=b.classList.contains('light')?'🌙 Dark':'☀ Light';
}
function showMode(m,el){
  document.querySelectorAll('.mode-tab').forEach(t=>t.classList.remove('active'));
  el.classList.add('active');
  document.getElementById('mode-single').style.display=m==='single'?'':'none';
  document.getElementById('mode-compare').style.display=m==='compare'?'':'none';
}

// ─── SAMPLE DATA ─────────────────────────────────────────────────────────────

// ─── PARSER ──────────────────────────────────────────────────────────────────
function parseHeaders(raw){
  const lines=raw.replace(/\r\n/g,'\n').replace(/\r/g,'\n').split('\n');
  const hdrs=[];let cur=null;
  for(const ln of lines){
    if(!ln.trim())continue;
    if(/^\s/.test(ln)&&cur){cur.value+=' '+ln.trim();}
    else{const m=ln.match(/^([^:]+):\s*(.*)/);if(m){cur={name:m[1].trim(),value:m[2].trim()};hdrs.push(cur);}}
  }
  return hdrs;
}
function getAll(hdrs,name){return hdrs.filter(h=>h.name.toLowerCase()===name.toLowerCase()).map(h=>h.value);}
function getFirst(hdrs,name){const r=getAll(hdrs,name);return r.length?r[0]:null;}

// ─── GATEWAY DETECTION ENGINE ────────────────────────────────────────────────
// Returns { gatewayMode, gatewayHops, finalHop, authOrig, effectiveAuth }
// Works for any gateway vendor and any final delivery platform.
function detectGatewayMode(hops, auth, hdrs){
  // 1. Find all gateway hops (type='gateway') and the final delivery hop
  const gatewayHops=hops.filter(h=>h.sys&&h.sys.type==='gateway');
  const finalHop=hops[hops.length-1];
  const finalSys=finalHop&&finalHop.sys;

  // 2. Collect vendor-specific auth headers
  // Priority: vendor-specific header > Authentication-Results-Original > AR from gateway's own domain
  let authOrig={};

  // Proofpoint-specific
  const authOrigVals=getAll(hdrs,'authentication-results-original');
  for(const v of authOrigVals) Object.assign(authOrig,parseAuth(v));

  // Mimecast stamps its AR with domain "mx.mimecast.com" — find AR headers NOT from the final MTA
  // and parse the one most likely from the gateway
  if(!Object.keys(authOrig).length){
    const allARVals=getAll(hdrs,'authentication-results');
    // The final MTA's AR is usually the FIRST one (headers prepended in reverse order)
    // The gateway's AR is usually deeper in the list
    if(allARVals.length>1){
      // Try to find an AR that matches a gateway domain
      for(let i=1;i<allARVals.length;i++){
        const parsed=parseAuth(allARVals[i]);
        if(parsed.spf==='pass'||parsed.dkim==='pass'){
          Object.assign(authOrig,parsed);
          break;
        }
      }
    }
  }

  // Vendor-specific indicator headers — if we see them, we know a gateway processed this
  const allHdrNames=hdrs.map(h=>h.name.toLowerCase());
  const vendorIndicators={
    'Proofpoint Gateway': ['x-proofpoint-guid','x-proofpoint-spam-details'],
    'Mimecast Gateway':   ['x-mc-unique','x-mimecast-spam-score','x-mimecast-bulk-signature'],
    'Barracuda Gateway':  ['x-barracuda-spam-score','x-barracuda-connect'],
    'Cisco ESA':          ['x-ironport-anti-spam-filtered','x-ironport-av'],
    'Abnormal Security':  ['x-abnormal-status'],
  };
  let detectedGatewayName=null;
  for(const [gname,indicators] of Object.entries(vendorIndicators)){
    if(indicators.some(ind=>allHdrNames.some(h=>h.startsWith(ind.toLowerCase())))){
      detectedGatewayName=gname;
      break;
    }
  }

  // 3. Determine if gateway mode applies:
  //    - A gateway hop exists in the chain OR vendor indicators found
  //    - The final delivery hop is a cloud MTA (Exchange, Google, etc.)
  //    - Auth at the boundary shows failures in at least one key area
  //    - We have pre-gateway auth that shows passes
  const hasGateway=gatewayHops.length>0||!!detectedGatewayName;
  const primaryGateway=gatewayHops.length>0?gatewayHops[gatewayHops.length-1]:
    (detectedGatewayName?{sys:{name:detectedGatewayName,type:'gateway'}}:null);
  const origPassed=Object.keys(authOrig).length>0&&
    (authOrig.spf==='pass'||authOrig.dkim==='pass'||authOrig.dmarc==='pass');
  const boundaryFailed=auth.spf!=='pass'||auth.dkim!=='pass'||auth.dmarc!=='pass';
  const isFinalCloud=finalSys&&(finalSys.type==='cloud');

  const gatewayMode=hasGateway&&(origPassed||!boundaryFailed)&&(isFinalCloud||hasGateway);

  // 4. Build effectiveAuth — use gateway results for checks where boundary failed
  //    but keep boundary results where they passed
  const effectiveAuth=gatewayMode?{...auth,...authOrig,_gateway:primaryGateway&&primaryGateway.sys?primaryGateway.sys.name:detectedGatewayName}:auth;

  return{
    gatewayMode,
    gatewayHops,
    gatewayHop:primaryGateway,
    detectedGatewayName,
    authOrig,
    effectiveAuth,
    finalSys
  };
}

function parseReceived(val){
  const fromM=val.match(/from\s+(\S+)\s*(?:\(([^)]+)\))?/i);
  const byM=val.match(/by\s+(\S+)/i);
  const withM=val.match(/with\s+([\w]+)/i);
  const dateM=val.match(/;\s*(.+)$/);
  const forM=val.match(/for\s+<([^>]+)>/i);
  const ipM=(fromM&&fromM[2])?fromM[2].match(/[\d\.]+/):null;
  const tlsM=val.match(/TLS[\w_.]+/i);
  const idM=val.match(/id\s+([\w.\-]+)/i);
  const viaM=val.match(/via\s+(\S+)/i);
  let date=null;
  if(dateM){try{date=new Date(dateM[1].trim());}catch(e){}}
  return{
    from:fromM?(fromM[2]||fromM[1]):null,
    fromHost:fromM?fromM[1]:null,
    by:byM?byM[1]:null,
    with:withM?withM[1]:null,
    date:(date&&!isNaN(date))?date:null,
    for:forM?forM[1]:null,
    ip:ipM?ipM[0]:null,
    tls:tlsM?tlsM[0]:null,
    queueId:idM?idM[1]:null,
    via:viaM?viaM[1]:null,
    raw:val
  };
}

function parseAuth(val){
  const r={};
  const spfM=val.match(/spf=([\w]+)/i);
  const dkimM=val.match(/dkim=([\w]+)/i);
  const dmarcM=val.match(/dmarc=([\w]+)/i);
  const arcM=val.match(/arc=([\w]+)/i);
  const compM=val.match(/compauth=([\w]+)/i);
  const compReasonM=val.match(/reason=(\d+)/i);
  if(spfM)r.spf=spfM[1].toLowerCase();
  if(dkimM)r.dkim=dkimM[1].toLowerCase();
  if(dmarcM)r.dmarc=dmarcM[1].toLowerCase();
  if(arcM)r.arc=arcM[1].toLowerCase();
  if(compM)r.compauth=compM[1].toLowerCase();
  if(compReasonM)r.compReason=compReasonM[1];
  return r;
}

function authClass(v){
  if(!v)return'none';
  v=v.toLowerCase();
  if(v==='pass'||v.startsWith('pass'))return'pass';
  if(v==='fail'||v==='hardfail')return'fail';
  if(v==='softfail')return'soft';
  if(v==='none'||v==='neutral')return'none';
  return'none';
}
function authIcon(v){const c=authClass(v);return c==='pass'?'✓':c==='fail'?'✗':c==='soft'?'~':'?';}
function authBadge(label,val){
  if(!val)return'';
  const c=authClass(val);
  const cls=c==='pass'?'b-pass':c==='fail'?'b-fail':c==='soft'?'b-soft':'b-none';
  return`<span class="badge ${cls}">${authIcon(val)} ${label}: ${esc(val)}</span>`;
}

function delayClass(ms){
  if(ms<0)return'none';
  if(ms<10000)return'fast';
  if(ms<60000)return'minor';
  if(ms<600000)return'warn';
  return'crit';
}
function delayLabel(ms){
  if(ms<0)return'clock skew';
  if(ms<1000)return'<1s';
  if(ms<60000)return Math.round(ms/1000)+'s';
  if(ms<3600000)return Math.round(ms/60000)+'m';
  return(ms/3600000).toFixed(1)+'h';
}
function delayExplain(ms){
  if(ms<0)return'Server clocks may be slightly out of sync — this is normal and harmless.';
  if(ms<10000)return'Delivery was near-instant at this hop — no concern.';
  if(ms<60000)return'Minor delay, likely normal processing, TLS negotiation, or brief queue.';
  if(ms<600000)return'Noticeable delay. Possible causes: greylisting, content scanning, connector retry, or queue backlog.';
  return'Significant delay. Likely causes: server queue congestion, greylisting, delivery retry loop, rate limiting, or remote server unavailability.';
}

function hopDescription(hop,i,total,sys){
  const byName=sys?sys.name:(hop.by||'unknown server');
  if(i===0&&total===1)return'Message sent and delivered directly';
  if(i===0)return`Message submitted from sender${hop.fromHost?' ('+hop.fromHost+')':''}`;
  if(i===total-1)return`Message delivered to recipient mailbox via ${byName}`;
  if(sys){
    if(sys.name.includes('Proofpoint'))return`Message scanned by ${sys.name}`;
    if(sys.name.includes('Exchange Online Protection'))return`Message processed by Exchange Online Protection (EOP)`;
    if(sys.name.includes('Exchange Online'))return`Message accepted by Exchange Online`;
    if(sys.name.includes('Google'))return`Message handled by ${sys.name}`;
    if(sys.name.includes('Mimecast')||sys.name.includes('Barracuda')||sys.name.includes('Cisco'))return`Message scanned by email security gateway (${sys.name})`;
    return`Message transferred to ${sys.name}`;
  }
  return`Message transferred to ${hop.by||'mail server'}`;
}

function esc(s){return(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

// ─── MS HEADER PARSING ────────────────────────────────────────────────────────
function parseMSHeaders(hdrs){
  const scl=getFirst(hdrs,'x-ms-exchange-organization-scl');
  const bcl=getFirst(hdrs,'x-ms-exchange-organization-bcl');
  const pcl=getFirst(hdrs,'x-ms-exchange-organization-pcl');
  const ffas=getFirst(hdrs,'x-forefront-antispam-report');
  const msas=getFirst(hdrs,'x-microsoft-antispam');
  const netId=getFirst(hdrs,'x-ms-exchange-organization-network-message-id');
  return{scl:scl?parseInt(scl):null,bcl:bcl?parseInt(bcl):null,pcl:pcl?parseInt(pcl):null,ffas,msas,netId};
}
function sclExplain(v){
  if(v===null)return'Not set';
  if(v<0)return'Bypass spam filtering';
  if(v===0||v===1)return'Message is not spam';
  if(v===5||v===6)return'Message likely spam — may go to Junk folder';
  if(v===7||v===8||v===9)return'Message is high-confidence spam';
  return'SCL '+v;
}
function bclExplain(v){
  if(v===null)return'Not set';
  if(v===0)return'Sender is not a bulk mailer';
  if(v<=3)return'Low bulk complaint level';
  if(v<=7)return'Moderate bulk — may reach some users junk';
  return'High bulk complaint level — likely junk folder';
}

// ─── GENERATE FINDING ────────────────────────────────────────────────────────
function generateFinding(hops,auth,authOrig,ms,totalDelay){
  let findings=[];let conf='Medium';
  const maxDelay=hops.reduce((mx,h,i)=>{
    if(i===0||!h.delay)return mx;
    return h.delay>mx?h.delay:mx;
  },0);
  const maxHop=hops.find((h,i)=>i>0&&h.delay===maxDelay);

  // Detect gateway-induced auth failure: boundary MTA (e.g. EOP) sees failures
  // but the pre-gateway auth (e.g. Proofpoint Authentication-Results-Original) shows passes
  const gatewayRedeemedAuth=(authOrig.spf==='pass'||authOrig.dkim==='pass')&&
    (auth.spf!=='pass'||auth.dkim!=='pass');
  const hasGateway=hops.some(h=>h.sys&&(h.sys.name.includes('Proofpoint')||h.sys.name.includes('Mimecast')||h.sys.name.includes('Barracuda')||h.sys.name.includes('Cisco')));

  if(maxDelay>600000){
    const sys=maxHop?classifySystem(maxHop.by):null;
    findings.push(`The message experienced a significant delay of ${delayLabel(maxDelay)}${sys?' at '+sys.name:''}, possibly due to queue congestion, greylisting, or rate limiting.`);
    conf='High';
  }

  if(gatewayRedeemedAuth&&hasGateway){
    // The gateway verified auth before forwarding; boundary MTA re-check failures are expected
    findings.push('Authentication checks at the final mail gateway (e.g. Exchange Online) show failures, but this is expected: the message was first verified as legitimate by an intermediate security gateway (Proofpoint or similar), which re-stamped the headers. The original authentication passed at that gateway. This pattern is normal and does not indicate spoofing — it indicates a third-party email filter in the delivery path.');
    conf='High';
  } else if(auth.compauth==='pass'&&(auth.spf!=='pass'||auth.dmarc!=='pass')){
    // Microsoft's composite auth overrode individual failures
    findings.push('Individual authentication checks (SPF/DKIM/DMARC) show failures, but Microsoft composite authentication passed. This typically means Microsoft\'s systems recognized the sender as legitimate through implicit signals (e.g. known sending infrastructure, domain reputation) despite strict check failures — often caused by complex routing or third-party gateway processing.');
    conf='High';
  } else if(auth.spf==='fail'&&auth.dmarc==='fail'&&!hasGateway){
    findings.push('Authentication failures were detected with no intermediate gateway to explain them — the message may be spoofed or the sender\'s mail system may be misconfigured.');
    conf='High';
  } else if(auth.spf==='softfail'&&auth.dkim==='fail'&&auth.dmarc==='fail'&&!gatewayRedeemedAuth){
    findings.push('SPF soft-failed and DKIM failed, causing DMARC to fail. This may indicate the message was sent from a server not fully authorized by the sender\'s domain, or was processed by a gateway that broke DKIM signing. If no gateway is involved, this warrants scrutiny.');
    conf='Medium';
  } else if(auth.spf==='pass'&&auth.dkim==='pass'&&auth.dmarc==='pass'){
    findings.push('All authentication checks passed. The message appears legitimate and was not tampered with in transit.');
    conf='High';
  } else if(auth.spf==='pass'&&auth.dkim==='pass'){
    findings.push('SPF and DKIM passed. The message appears to be from a legitimate sender.');
    conf='High';
  }

  if(ms.scl!==null&&ms.scl>=5){
    findings.push(`Microsoft assigned a Spam Confidence Level of ${ms.scl} — the message was likely filtered to Junk Email.`);
  }
  if(hops.length>6&&!findings.some(f=>f.includes('hops'))){
    findings.push(`The message passed through ${hops.length} hops. This is above average and consistent with routing through one or more third-party security gateways before reaching the destination mail server.`);
  }
  if(!findings.length){
    if(totalDelay!==null){
      findings.push(`Message delivered normally in ${delayLabel(totalDelay)} across ${hops.length} hop${hops.length!==1?'s':''}.`);
    } else {
      findings.push('Headers parsed successfully. No anomalies detected.');
    }
    conf='Medium';
  }
  return{text:findings.join(' '),conf};
}

// ─── MAIL PROVIDER DETECTION ─────────────────────────────────────────────────
// Determines the final mail provider and whether hybrid Exchange is in play.
// Returns { mailProvider, isHybrid }
function detectMailProvider(hops, hdrs){
  // Hybrid Exchange indicators in headers
  const hasHybridHeaders=!!(
    getFirst(hdrs,'x-ms-exchange-organization-messagedirectionality')||
    getFirst(hdrs,'x-ms-exchange-crosstenant-id')||
    getFirst(hdrs,'x-ms-exchange-transport-crosstenantheadersstamped')
  );
  // Look at last 3 hops for Exchange on-prem fingerprints
  const lastHops=hops.slice(-3);
  const hasEOP=lastHops.some(h=>h.sys&&h.sys.name.includes('Exchange Online Protection'));
  const hasEXO=lastHops.some(h=>h.sys&&h.sys.name.includes('Exchange Online'));
  const hasOnPrem=lastHops.some(h=>{
    // On-prem Exchange hostnames typically: mail.domain.com, SERVERNAME.domain.local,
    // or contain 'EXCH','MAIL','HUB','MBX' and are NOT *.outlook.com / *.protection.outlook.com
    if(!h.by)return false;
    const isCloud=/outlook\.com|office365|prod\.outlook|protection\.outlook|pphosted|mimecast|barracuda|google\.com|gmail/i.test(h.by);
    const looksOnPrem=/exch|mbx|hub|cas\b|mail\.|smtp\./i.test(h.by)||/\.(local|internal|corp|lan)$/i.test(h.by);
    return !isCloud&&looksOnPrem;
  });
  // Also check if last hop's software stamp looks like on-prem Exchange
  const finalHop=hops[hops.length-1];
  const finalBy=finalHop?finalHop.by||'':'';
  const finalIsCloud=/outlook\.com|office365|prod\.outlook|google\.com|gmail/i.test(finalBy);
  const finalIsOnPrem=!finalIsCloud&&/exch|mbx|hub|cas\b|mail\.|smtp\./i.test(finalBy);

  let mailProvider='Unknown';
  let isHybrid=false;

  if(hasEOP||hasEXO||(hasHybridHeaders&&(hasEOP||hasEXO))){
    if(hasHybridHeaders&&(hasOnPrem||finalIsOnPrem)){
      mailProvider='On-prem Exchange / M365 Hybrid';
      isHybrid=true;
    } else {
      mailProvider='Microsoft Exchange Online (M365)';
    }
  } else if(finalIsOnPrem||hasOnPrem){
    // On-prem without cloud indicators — could still be hybrid if cross-tenant headers present
    if(hasHybridHeaders){
      mailProvider='On-prem Exchange / M365 Hybrid';
      isHybrid=true;
    } else {
      mailProvider='On-prem Exchange';
    }
  } else if(finalBy&&/google\.com|gmail\.com|googlemail/i.test(finalBy)){
    mailProvider='Google Workspace / Gmail';
  } else if(finalBy&&/amazonses|ses\.amazonaws/i.test(finalBy)){
    mailProvider='Amazon SES';
  } else if(finalHop&&finalHop.sys&&finalHop.sys.type==='cloud'){
    mailProvider=finalHop.sys.name;
  } else if(finalHop&&finalHop.sys){
    mailProvider=finalHop.sys.name;
  }

  return{mailProvider,isHybrid};
}

// ─── DELIVERY CLASSIFICATION ─────────────────────────────────────────────────
function classifyDelivery(hdrs,hops){
  const contentType=getFirst(hdrs,'content-type')||'';
  const isNDR=/delivery-status|report-type=delivery/i.test(contentType);
  const action=(getFirst(hdrs,'action')||'').toLowerCase();
  const status=getFirst(hdrs,'status')||'';
  const finalRecipient=getFirst(hdrs,'final-recipient');
  const diagnosticCode=getFirst(hdrs,'diagnostic-code')||'';
  const hasFailedRecipients=!!getFirst(hdrs,'x-failed-recipients');
  const allText=hdrs.map(h=>h.value).join(' ');
  const smtp5xx=/\b5\d\d\b/.test(allText);
  const smtp4xx=/\b4\d\d\b/.test(allText);
  if(isNDR||action==='failed'||hasFailedRecipients||(status&&/^5/.test(status.trim()))){
    return{mode:'bounced',ndrStatus:status||null,ndrAction:action||'failed',ndrDiagnostic:diagnosticCode||null,finalRecipient:finalRecipient||null};
  }
  if(smtp5xx&&hops.length<3)return{mode:'rejected',ndrStatus:null,ndrAction:null,ndrDiagnostic:null,finalRecipient:null};
  if(smtp4xx&&hops.length<2)return{mode:'deferred',ndrStatus:null,ndrAction:null,ndrDiagnostic:null,finalRecipient:null};
  if(hops.length===1)return{mode:'incomplete',ndrStatus:null,ndrAction:null,ndrDiagnostic:null,finalRecipient:null};
  return{mode:'completed',ndrStatus:null,ndrAction:null,ndrDiagnostic:null,finalRecipient:null};
}

// ─── EVIDENCE TAG ────────────────────────────────────────────────────────────
function evidenceTag(type){
  const map={
    direct:    {cls:'b-pass',  label:'Direct Evidence',     tip:'Confirmed directly from header data'},
    correlated:{cls:'b-blue',  label:'Correlated Evidence',  tip:'Inferred by cross-referencing multiple headers'},
    heuristic: {cls:'b-none',  label:'Heuristic Inference',  tip:'Best-guess based on known patterns — not confirmed'},
  };
  const d=map[type]||map.heuristic;
  return`<span class="badge ${d.cls}" style="font-size:10px;letter-spacing:.2px;" title="${esc(d.tip)}">${d.label}</span>`;
}

// ─── HYBRID ROUTING CHECK ────────────────────────────────────────────────────
function isHybridRouting(hops){
  const hasEOP=hops.some(h=>h.sys&&h.sys.name.includes('Exchange Online Protection'));
  const hasOnPrem=hops.some(h=>{
    if(!h.by)return false;
    const isCloud=/outlook\.com|office365|prod\.outlook|protection\.outlook/i.test(h.by);
    return !isCloud&&/exch|mbx|hub|mail\./i.test(h.by);
  });
  return hasEOP&&hasOnPrem;
}

// ─── MAIL FLOW STORY ─────────────────────────────────────────────────────────
// Returns structured objects for distributed rendering:
//   {type:'timing', text}          → journey-level header line
//   {type:'hop', hopIndex, text}   → inline callout on a specific hop card
//   {type:'phase', phase, text}    → subtitle on a phase header
//   {type:'outcome', text}         → Delivery Outcome phase at journey bottom
function generateMailFlowStory(hops,auth,effectiveAuth,aOrig,gatewayMode,gwName,deliveryClass,totalDelay,from,to,mailer){
  const items=[];
  const firstHop=hops[0];
  const sentTime=firstHop&&firstHop.date&&!isNaN(firstHop.date)?
    firstHop.date.toLocaleTimeString(undefined,{hour:'2-digit',minute:'2-digit',hour12:true}):null;

  // Timing summary → journey header
  if(totalDelay!==null){
    if(totalDelay<10000)items.push({type:'timing',text:'Total transit time: '+delayLabel(totalDelay)+' — well within normal range.'});
    else if(totalDelay<120000)items.push({type:'timing',text:'Total transit time: '+delayLabel(totalDelay)+'.'});
    else items.push({type:'timing',text:'Total transit time: '+delayLabel(totalDelay)+' — above normal. See investigation point below.'});
  }

  // Hop-level sentences
  for(let i=0;i<hops.length;i++){
    const hop=hops[i];
    const sys=hop.sys;
    const name=sys?sys.name:(hop.by||'an unknown server');
    const tls=hop.tls||/TLS|ESMTPS/i.test(hop.with||'');
    const enc=tls?' over an encrypted (TLS) connection':'';

    if(i===0){
      const sub=mailer&&sentTime?'Composed in '+esc(mailer)+', submitted at '+sentTime+'.':
        sentTime?'Submitted at '+sentTime+' by '+esc(from||'the sender')+'.':
        'Submitted by '+esc(from||'the sender')+'.';
      items.push({type:'hop',hopIndex:i,text:sub});
      continue;
    }
    if(i===hops.length-1){
      if(deliveryClass.mode==='completed')
        items.push({type:'hop',hopIndex:i,text:'Message delivered to recipient mailbox via '+esc(name)+enc+'.'});
      else if(deliveryClass.mode==='bounced'||deliveryClass.mode==='rejected')
        items.push({type:'hop',hopIndex:i,text:'Message reached '+esc(name)+' and was rejected'+(deliveryClass.ndrStatus?' ('+esc(deliveryClass.ndrStatus)+')':'')+'.'});
      else
        items.push({type:'hop',hopIndex:i,text:'Last recorded hop. No further data available — message may have been queued, rejected, or delivered silently.'});
      continue;
    }
    if(sys&&sys.type==='gateway'){
      const gwAuth=(gatewayMode&&aOrig&&aOrig.spf==='pass'&&aOrig.dkim==='pass')?' SPF, DKIM, and DMARC verified successfully.':'';
      items.push({type:'hop',hopIndex:i,text:'Message received and scanned'+enc+'.'+gwAuth});
    } else {
      items.push({type:'hop',hopIndex:i,text:'Message forwarded'+enc+'.'});
    }
  }

  // Phase-level auth annotation → gateway phase
  if(gatewayMode&&aOrig&&aOrig.spf==='pass'){
    items.push({type:'phase',phase:'gateway',text:'Authentication (SPF, DKIM, DMARC) verified by '+esc(gwName)+'. Failures at the boundary server are expected gateway forwarding artifacts.'});
  } else if(effectiveAuth.spf==='pass'&&effectiveAuth.dkim==='pass'&&effectiveAuth.dmarc==='pass'){
    items.push({type:'phase',phase:'cloud-filtering',text:'All authentication checks passed — message confirmed as legitimate.'});
  } else {
    const failed=[effectiveAuth.spf!=='pass'?'SPF':'',effectiveAuth.dkim!=='pass'&&effectiveAuth.dkim!=='present'?'DKIM':'',effectiveAuth.dmarc!=='pass'?'DMARC':''].filter(Boolean);
    if(failed.length)items.push({type:'phase',phase:'cloud-filtering',text:failed.join(' and ')+' check'+(failed.length>1?'s':'')+' failed. Review sender domain configuration.'});
  }

  // Outcome sentences → outcome phase
  if(deliveryClass.mode==='completed'){
    items.push({type:'outcome',text:'Delivery completed successfully.'});
  } else if(deliveryClass.mode==='bounced'){
    items.push({type:'outcome',text:'Delivery failed — message bounced. The message did not reach the intended recipient.'});
    if(deliveryClass.ndrDiagnostic)items.push({type:'outcome',text:'Diagnostic: '+esc(deliveryClass.ndrDiagnostic)});
  } else if(deliveryClass.mode==='rejected'){
    items.push({type:'outcome',text:'Delivery failed — message rejected at the boundary. No further hops were recorded.'});
  } else if(deliveryClass.mode==='deferred'){
    items.push({type:'outcome',text:'Delivery was deferred (temporary failure). The sending server may retry.'});
  } else if(deliveryClass.mode==='incomplete'){
    items.push({type:'outcome',text:'These headers are incomplete. The full delivery path is not visible. Investigate at the last recorded system.'});
  }

  return items;
}

// ─── INVESTIGATION POINT ─────────────────────────────────────────────────────
// urgency: 'clear' | 'info' | 'warn' | 'critical'
// clear    → green, collapsed, "delivered fine, here's the most impactful hop if curious"
// info     → blue, collapsed, mild note worth knowing but not alarming
// warn     → amber, collapsed-but-eye-catching, something is off
// critical → red, EXPANDED by default, tool suspects a real issue
function generateInvestigationPoint(hops,auth,effectiveAuth,aOrig,gatewayMode,gwName,mailProvider,deliveryClass,totalDelay,ms,isHybrid){
  let maxDelayMs=0,maxDelayHop=null,maxDelayIdx=0;
  hops.forEach((h,i)=>{if(i>0&&h.delay&&h.delay>maxDelayMs){maxDelayMs=h.delay;maxDelayHop=h;maxDelayIdx=i;}});
  const pct=totalDelay&&totalDelay>0?Math.round(maxDelayMs/totalDelay*100):null;

  let target='',reason='',intro='',checks=[],evidence='heuristic',urgency='clear';

  // ── CRITICAL: failure modes, major delays ──────────────────────────────────
  if(deliveryClass.mode==='bounced'||deliveryClass.mode==='rejected'){
    urgency='critical';
    const lastHop=hops[hops.length-1];
    target=lastHop&&lastHop.sys?lastHop.sys.name:(lastHop&&lastHop.by?lastHop.by:'Last Known System');
    intro='This message did not reach its destination. A delivery failure was detected.';
    reason='Rejected at this system'+(deliveryClass.ndrStatus?' with status '+esc(deliveryClass.ndrStatus):'')+'. This is the point of failure — no further hops were recorded.';
    evidence='direct';
    checks=['Review rejection logs at the rejecting server for the exact SMTP error code','Verify the recipient address exists and the mailbox is active','Check whether the sender IP or domain is listed on any block list (MX Toolbox, Spamhaus)','Confirm the sending domain has valid SPF and DKIM records'];
  }
  else if(maxDelayMs>=300000){
    // 5+ minute hop — clearly problematic regardless of context
    urgency='critical';
    const sys=maxDelayHop.sys;
    target=sys?sys.name:(maxDelayHop.by||'Unknown server');
    const prevHop=hops[maxDelayIdx-1];
    const prevName=prevHop&&prevHop.sys?prevHop.sys.name:(prevHop&&prevHop.by?prevHop.by:'the previous hop');
    intro='A significant delay was detected. The tool suspects a delivery issue at this system.';
    reason='A delay of '+delayLabel(maxDelayMs)+(pct!==null?' ('+pct+'% of total transit time)':'')+' was recorded between '+esc(prevName)+' and '+esc(target)+'. This is well outside normal processing time.';
    evidence='direct';
    checks=getChecksForSystem(sys,target);
  }
  else if(!gatewayMode&&(auth.spf==='fail'||auth.dmarc==='fail')){
    urgency='critical';
    const failed=[auth.spf==='fail'?'SPF':'',auth.dmarc==='fail'?'DMARC':''].filter(Boolean);
    target='Sender Authentication Failure';
    intro='Hard authentication failures were detected with no gateway to explain them. This warrants investigation.';
    reason=failed.join(' and ')+' hard-failed. No third-party gateway was detected to account for the failure. This could indicate spoofing or a broken sender DNS configuration.';
    evidence='correlated';
    checks=['Verify the sending domain SPF record includes all authorized sending IPs','Check DKIM selector is published and valid in DNS','Review DMARC policy — a p=reject or p=quarantine policy means this message may be filtered or blocked','Confirm no third-party relay or ESP is sending without SPF/DKIM coverage'];
  }

  // ── WARN: notable but not alarming ────────────────────────────────────────
  else if(maxDelayMs>=60000&&maxDelayMs<300000){
    // 1–5 minute single hop — worth noting, may or may not be a real problem
    urgency='warn';
    const sys=maxDelayHop.sys;
    target=sys?sys.name:(maxDelayHop.by||'Unknown server');
    const prevHop=hops[maxDelayIdx-1];
    const prevName=prevHop&&prevHop.sys?prevHop.sys.name:(prevHop&&prevHop.by?prevHop.by:'the previous hop');
    intro='Delivery completed, but a notable delay was detected at one hop. This may warrant a closer look.';
    reason='A delay of '+delayLabel(maxDelayMs)+(pct!==null?' ('+pct+'% of total transit)':'')+' occurred between '+esc(prevName)+' and '+esc(target)+'. This is above normal for a single hop but may reflect legitimate queue processing or greylisting.';
    evidence='direct';
    checks=getChecksForSystem(sys,target);
  }
  else if(isHybrid){
    urgency='warn';
    target='Hybrid Connector';
    intro='Hybrid Exchange routing was detected. This is a common source of intermittent delivery issues.';
    reason='The message routed through both Exchange Online and on-premises Exchange. Hybrid mail flow is more complex and has more potential failure points than a cloud-only environment.';
    evidence='correlated';
    checks=['Verify Hybrid Configuration Wizard (HCW) has run successfully and recently','Check Send/Receive Connectors on on-prem Exchange for certificate validity','Review Exchange hybrid mail flow in Exchange Admin Center','Confirm hybrid connector certificates are not expired'];
  }
  else if(!gatewayMode&&auth.spf==='softfail'){
    urgency='info';
    target='Sender SPF Configuration';
    intro='Delivery completed. One item is worth noting.';
    reason='SPF soft-failed for this sender. This means the sending server is not listed in the domain SPF record, but the domain configured SPF to allow soft failures (~all). The message was likely delivered, but this could cause issues if the sender tightens their policy.';
    evidence='correlated';
    checks=['Confirm whether the sending IP should be authorized by the domain SPF record','Check if a third-party relay or ESP is sending on behalf of this domain','Review whether the domain intends to move from ~all to -all SPF enforcement'];
  }

  // ── CLEAR: everything is fine ──────────────────────────────────────────────
  else{
    urgency='clear';
    // Still surface the most impactful hop for the "curious" case
    if(maxDelayHop&&maxDelayMs>0){
      const sys=maxDelayHop.sys;
      target=sys?sys.name:(maxDelayHop.by||'Unknown server');
      const prevHop=hops[maxDelayIdx-1];
      const prevName=prevHop&&prevHop.sys?prevHop.sys.name:(prevHop&&prevHop.by?prevHop.by:'the previous hop');
      intro='This message appears to have delivered within a reasonable time. If you want to review delivery performance or dig deeper, here is where the most processing time was spent.';
      reason=delayLabel(maxDelayMs)+(pct!==null?' ('+pct+'% of transit)':'')+' was spent between '+esc(prevName)+' and '+esc(target)+'. This is within normal range and does not indicate a problem.';
      checks=getChecksForSystem(sys,target);
    } else {
      target='No Significant Delays Detected';
      intro='This message appears to have delivered within a reasonable time. No delays, authentication issues, or routing anomalies were found.';
      reason='All hops processed within normal parameters.';
      checks=[];
    }
    evidence='direct';
  }

  return{target,reason,intro,checks,evidence,urgency,pct,maxDelayMs};
}

function getChecksForSystem(sys,fallbackName){
  if(!sys)return['Review SMTP queue logs at this server around the delay timestamp','Check for rate limiting or connection throttling','Verify DNS resolution from this server'];
  if(sys.name.includes('Proofpoint'))return['Review Proofpoint queue status and SMTP connection health','Check greylisting policy for this sender IP','Review Proofpoint-to-destination connector health','Check connection retry logs for this sender domain'];
  if(sys.name.includes('Mimecast'))return['Review Mimecast delivery queue logs','Check Mimecast greylisting and sender reputation settings','Verify Mimecast-to-destination connector configuration','Check Mimecast SMTP diagnostics for this message ID'];
  if(sys.name.includes('Exchange Online Protection')||sys.name.includes('Exchange Online'))return['Run Microsoft 365 Message Trace (admin.microsoft.com)','Check mail flow rules / transport rules for delays','Review inbound connector configuration','Check Microsoft 365 service health dashboard for active incidents'];
  if(sys.name.includes('Google'))return['Review Google Workspace Admin Console > Reports > Email Log Search','Check inbound routing and compliance rules in Google Admin','Verify SPF/DKIM/DMARC configuration for the sending domain'];
  if(sys.name.includes('Barracuda'))return['Review Barracuda message log and delivery queue','Check sender IP reputation in Barracuda settings','Review Barracuda quarantine for this message'];
  if(sys.name.includes('Cisco')||sys.name.includes('IronPort'))return['Review Cisco ESA message tracking logs','Check sender reputation in Cisco SenderBase','Review ESA inbound policy and content filters'];
  return['Review SMTP queue logs at this server around the delay timestamp','Check for rate limiting or IP reputation issues','Verify DNS resolution and connectivity from this server','Check for greylisting or connection throttling'];
}

function calcHopResponsibility(hops,totalDelay){
  return hops.map((h,i)=>{
    if(i===0||h.delay===null||!totalDelay)return{...h,pct:null};
    return{...h,pct:totalDelay>0?Math.round(h.delay/totalDelay*100):0};
  });
}

function decodeHeaders(){
  const raw=document.getElementById('headerInput').value.trim();
  if(!raw){return;}
  const hdrs=parseHeaders(raw);
  if(!hdrs.length){
    document.getElementById('results').innerHTML='<div class="error-box">⚠ Could not parse headers. Paste the full raw email headers.</div>';
    return;
  }

  const from=getFirst(hdrs,'from')||'—';
  // To: may be absent — fall back to envelope recipient from Received headers
  let to=getFirst(hdrs,'to');
  if(!to||to==='—'){
    const receivedForMatch=getAll(hdrs,'received').map(v=>{const m=v.match(/for\s+<([^>]+)>/i);return m?m[1]:null;}).find(Boolean);
    const deliveredTo=getFirst(hdrs,'delivered-to')||getFirst(hdrs,'x-forwarded-to')||getFirst(hdrs,'x-original-to');
    to=receivedForMatch||deliveredTo||'—';
  }
  const subject=getFirst(hdrs,'subject')||'—';
  const date=getFirst(hdrs,'date')||'—';
  const msgId=getFirst(hdrs,'message-id')||'—';
  const replyTo=getFirst(hdrs,'reply-to');
  const mailer=getFirst(hdrs,'x-mailer')||getFirst(hdrs,'user-agent');
  const returnPath=getFirst(hdrs,'return-path');

  const receivedVals=getAll(hdrs,'received');
  const rawHops=receivedVals.map(v=>parseReceived(v)).reverse();
  const hops=rawHops.map((h,i)=>{
    const delay=(i>0&&h.date&&rawHops[i-1].date)?(h.date-rawHops[i-1].date):null;
    const sys=classifySystem(h.by,h.with)||classifySystem(h.fromHost,h.with);
    const desc=hopDescription(h,i,rawHops.length,sys);
    return{...h,delay,sys,desc,index:i};
  });

  const authVals=getAll(hdrs,'authentication-results');
  let auth={};
  for(const v of authVals)Object.assign(auth,parseAuth(v));
  const spfHdr=getFirst(hdrs,'received-spf');
  if(!auth.spf&&spfHdr){const m=spfHdr.match(/^(\S+)/);if(m)auth.spf=m[1].toLowerCase();}
  if(!auth.dkim&&getFirst(hdrs,'dkim-signature'))auth.dkim='present';
  const arcVals=getAll(hdrs,'arc-authentication-results');
  if(arcVals.length&&!auth.arc){const ap=parseAuth(arcVals[0]);if(ap.arc)auth.arc=ap.arc;}

  const ms=parseMSHeaders(hdrs);
  const spamStatus=getFirst(hdrs,'x-spam-status');
  const spamScore=getFirst(hdrs,'x-spam-score');

  // ── GATEWAY MODE DETECTION ────────────────────────────────────────────────
  const gw=detectGatewayMode(hops,auth,hdrs);
  const {gatewayMode,gatewayHop,authOrig,effectiveAuth}=gw;
  const gwName=(gatewayHop&&gatewayHop.sys?gatewayHop.sys.name:gw.detectedGatewayName)||'Security Gateway';
  const gatewayNote=gatewayMode?` (verified by ${gwName} before forwarding)`:'';

  // Detect final mail provider and hybrid Exchange
  const {mailProvider,isHybrid}=detectMailProvider(hops,hdrs);

  let totalDelay=null;
  if(hops.length>=2&&hops[0].date&&hops[hops.length-1].date){
    totalDelay=hops[hops.length-1].date-hops[0].date;
  }
  const maxDelay=hops.reduce((mx,h)=>h.delay&&h.delay>mx?h.delay:mx,0);

  // New analysis engines
  const deliveryClass=classifyDelivery(hdrs,hops);
  const story=generateMailFlowStory(hops,auth,effectiveAuth,authOrig,gatewayMode,gwName,deliveryClass,totalDelay,from,to,mailer);
  const invPoint=generateInvestigationPoint(hops,auth,effectiveAuth,authOrig,gatewayMode,gwName,mailProvider,deliveryClass,totalDelay,ms,isHybrid);
  const hopsWithPct=calcHopResponsibility(hops,totalDelay);

  const finding=generateFinding(hops,auth,authOrig,ms,totalDelay);

  // known extra headers to skip in "additional" section
  const knownKeys=new Set(['received','from','to','subject','date','message-id','reply-to',
    'mime-version','content-type','content-transfer-encoding','dkim-signature',
    'x-google-dkim-signature','received-spf','authentication-results','delivered-to',
    'x-forwarded-to','x-original-to','x-mailer','x-spam-status','x-spam-score',
    'x-spam-flag','return-path','arc-seal','arc-message-signature','arc-authentication-results',
    'x-ms-exchange-organization-scl','x-ms-exchange-organization-pcl','x-ms-exchange-organization-bcl',
    'x-forefront-antispam-report','x-microsoft-antispam','x-ms-exchange-organization-network-message-id',
    'x-ms-has-attach','x-ms-tnef-correlator','list-unsubscribe','list-id','user-agent']);
  const extra=hdrs.filter(h=>!knownKeys.has(h.name.toLowerCase()));

  let html='';

  // ── 1. EXECUTIVE SUMMARY ─────────────────────────────────────────────────
  const dateLocal=(()=>{try{const d=new Date(date);return isNaN(d)?date:d.toLocaleString(undefined,{dateStyle:'medium',timeStyle:'short'});}catch(e){return date;}})();
  const confDots=(()=>{const dots=[];for(let i=0;i<4;i++){const filled=(finding.conf==='High')||(finding.conf==='Medium'&&i<2)||(finding.conf==='Low'&&i<1);dots.push('<div class="conf-dot'+(filled?' filled':'')+'"></div>');}return dots.join('');})();
  html+=`<div class="card">
  <div class="card-hd"><div class="card-icon ci-blue">📊</div><div><div class="card-title">Executive Summary</div><div class="card-desc">What happened to this message?</div></div></div>

  <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px;">
    <div class="sum-item"><div class="sum-lbl">From (Sender)</div><div class="sum-val" style="font-size:14px;font-weight:600;">${esc(from)}</div></div>
    <div class="sum-item"><div class="sum-lbl">To (Recipient)</div><div class="sum-val" style="font-size:14px;font-weight:600;">${esc(to)}</div></div>
  </div>

  <div style="display:grid;grid-template-columns:1fr auto;gap:8px;margin-bottom:8px;">
    <div class="sum-item"><div class="sum-lbl">Subject</div><div class="sum-val" style="font-size:13px;">${esc(subject)}</div></div>
    <div class="sum-item" style="min-width:220px;"><div class="sum-lbl">Date Sent (your local time)</div><div class="sum-val" style="font-size:13px;">${esc(dateLocal)}</div></div>
  </div>

  <div style="display:flex;flex-wrap:wrap;gap:8px;margin-bottom:8px;">
    <div class="sum-item" style="flex:1;min-width:120px;"><div class="sum-lbl">Delivery Time</div><div class="sum-val">${totalDelay!==null?delayLabel(totalDelay):'Unknown'}</div></div>
    <div class="sum-item" style="flex:1;min-width:80px;"><div class="sum-lbl">Hops</div><div class="sum-val">${hops.length}</div></div>
    <div class="sum-item" style="flex:1;min-width:100px;"><div class="sum-lbl">Largest Delay</div><div class="sum-val"><span class="delay-pill dp-${delayClass(maxDelay)}">${maxDelay>0?delayLabel(maxDelay):'None'}</span></div></div>
    <div class="sum-item" style="flex:2;min-width:180px;"><div class="sum-lbl">Auth Result${gatewayMode?' (gateway-verified)':''}</div><div class="sum-val" style="display:flex;gap:4px;flex-wrap:wrap;margin-top:2px;">
      ${authBadge('SPF',effectiveAuth.spf)} ${authBadge('DKIM',effectiveAuth.dkim)} ${authBadge('DMARC',effectiveAuth.dmarc)}
    </div></div>
  </div>

  <div style="display:flex;flex-wrap:wrap;gap:8px;margin-bottom:14px;">
    <div class="sum-item" style="flex:2;min-width:200px;">
      <div class="sum-lbl">Detected Mail Provider</div>
      <div class="sum-val" style="display:flex;align-items:center;gap:6px;">
        <span>${esc(mailProvider)}</span>
        ${isHybrid?'<span class="badge b-blue" style="font-size:10px;">Hybrid</span>':''}
      </div>

  // ── 2. AUTHENTICATION SUMMARY ────────────────────────────────────────────
  // Extract sender domain for contextual wording
  const senderDomainM=(from||'').match(/@([\w.\-]+)/);

  const authDefs=[

       fail:{badge:'b-fail',short:'Fail (Hard)',headline:'Server NOT authorized — high risk',
         detail:'The delivering server is not in '+senderDomain+'\'s SPF record and the record ends in -all (hard fail), meaning '+senderDomain+' has explicitly said no unauthorized servers should be trusted. This is a strong indicator of spoofing or a misconfigured mail system at '+senderDomain+'.'},
       softfail:{badge:'b-soft',short:'Softfail',headline:'Server not authorized — low confidence',
         detail:'The delivering server is not listed in '+senderDomain+'\'s SPF record, but the record ends in ~all (soft fail). This means '+senderDomain+' configured SPF to flag unauthorized senders without outright rejecting them — often seen during mail system migrations or with complex routing. It is suspicious but not conclusive. Your mail system may still accept or junk this message depending on DMARC policy.'},
       none:{badge:'b-none',short:'None',headline:'No SPF record found',
         detail:senderDomain+' has no SPF record published in DNS. This means there is no way to verify whether the sending server is authorized. Absence of SPF is not inherently malicious but is a configuration gap on '+senderDomain+'\'s side.'},
       neutral:{badge:'b-none',short:'Neutral',headline:'SPF explicitly takes no stance',

     status:{
       pass:{badge:'b-pass',short:'Pass',headline:'Message signature is valid',
         detail:'This message carries a cryptographic signature created by '+senderDomain+' (or a service they authorize). Your mail system verified that signature successfully, which means the message content was not altered between when '+senderDomain+' sent it and when you received it. It also confirms the message genuinely originated from a system '+senderDomain+' trusts.'},
       fail:{badge:'b-fail',short:'Fail',headline:'Signature invalid or absent',

  // ── 3. MESSAGE JOURNEY TIMELINE ───────────────────────────────────────────

  const storyByPhase={};
  const storyTiming=story.find(s=>s.type==='timing');

  function assignPhase(hop, i, allHops){
    const sys=hop.sys;
    const isFirst=i===0;
    const isLast=i===allHops.length-1;
    const by=hop.by||'';
    if(isFirst) return 'external-sending';
    if(sys&&sys.type==='gateway') return 'gateway';
    if(sys&&sys.type==='cloud'){

    if(!prevHasGateway&&!prevHasCloud) return 'public-routing';

  }

  const PHASE_META={

      html+=`<div style="height:16px;display:flex;align-items:center;justify-content:center;">

    group.hops.forEach((hop,hi)=>{

      const cardCls=isFirst?'hop-first':isLast?'hop-last':(hop.delay&&hop.delay>600000)?'hop-critical':(hop.delay&&hop.delay>60000)?'hop-warn':'';

      const sys=hop.sys;
